<!-- supervisor.html — Revisado + Logging (v2.1) -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Revisão do Supervisor</title>

  <style>
    :root {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text: #333;
      --primary: #0a84ff;
      --danger: #ff3b30;
      --radius: 16px;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      color: var(--text);
    }

    .card {
      max-width: 720px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 28px;
      border-radius: var(--radius);
      box-shadow: 0 10px 28px rgba(0,0,0,.08);
      transition: .3s;
    }

    h2 {
      margin-top: 0;
      text-align: center;
      font-weight: 600;
      font-size: 1.6rem;
      letter-spacing: -0.4px;
    }

    .info-box {
      background: #f1f3f5;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: .95rem;
      margin-bottom: 14px;
      border-left: 4px solid #d0d3d8;
    }

    .status-box {
      background: #e7f2ff;
      border-left: 4px solid var(--primary);
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 18px;
      display: none;
    }

    .actions {
      display: flex;
      gap: 14px;
      margin-top: 6px;
    }

    button {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: .25s;
    }

    .ok {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,122,255,.3);
    }
    .ok:hover { background: #0071e3; }

    .ko {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 4px 10px rgba(255,59,48,.3);
    }
    .ko:hover { background: #d63027; }

    #loading {
      display: none;
      margin-top: 16px;
      text-align: center;
      font-size: 1rem;
      opacity: .65;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Revisão do Supervisor</h2>

    <!-- Info do supervisor + ID -->
    <div class="info-box">
      ID do Rolo: <b><?= idRolo || "?" ?></b><br>
      Supervisor: <b><?= SUPERVISOR_NOME || "?" ?></b>
    </div>

    <!-- Status aparecerá aqui -->
    <div id="statusArea" class="status-box"></div>

    <!-- Botões -->
    <div id="actions" class="actions">
      <button id="btnOk" class="ok">Aprovar</button>
      <button id="btnKo" class="ko">Reprovar</button>
    </div>

    <div id="loading">⏳ Processando...</div>
  </div>

  <script>
    /* ------------------------------
       LOG SEGURO E CONTROLADO
    ------------------------------ */
    function log(...args) {
      console.log("[SUPERVISOR_HTML]", ...args);
    }

    /* ------------------------------
       VARIÁVEIS DO SERVIDOR
    ------------------------------ */
    const ID = "<?= idRolo ?>".trim();
    const PREFILL = "<?= prefillDecision ?>".trim().toUpperCase();
    const STATUS_SUP = "<?= statusSupervisor ?>".trim().toUpperCase();
    const SUP_NAME = "<?= SUPERVISOR_NOME ?>".trim() || "(sem nome)";

    log("Carregado parâmetros:", { ID, PREFILL, STATUS_SUP, SUP_NAME });

    /* ------------------------------
        ELEMENTOS DOM
    ------------------------------ */
    const statusArea = document.getElementById('statusArea');
    const actions = document.getElementById('actions');
    const loading = document.getElementById('loading');

    function showStatus(msg){
      statusArea.style.display = "block";
      statusArea.innerHTML = msg;
      log("Status exibido:", msg);
    }

    function hideActions(){ actions.style.display = "none"; }
    function showActions(){ actions.style.display = "flex"; }
    function showLoading(){ loading.style.display = "block"; }
    function hideLoading(){ loading.style.display = "none"; }

    /* ------------------------------
       INICIALIZAÇÃO
    ------------------------------ */
    window.onload = function(){
      log("Tela carregada.");

      // Se já há decisão no servidor, travar tudo
      if (STATUS_SUP) {
        log("Decisão já registrada no servidor, bloqueando ações.");
        showStatus(`Decisão já registrada: <b>${STATUS_SUP}</b>`);
        hideActions();
        return;
      }

      // Se o e-mail sugeriu uma decisão
      if (PREFILL) {
        showStatus(`Decisão sugerida: <b>${PREFILL}</b>`);
      }

      // Listeners
      document.getElementById('btnOk').onclick = () => {
        log("Clique: APROVAR");
        if (!confirm("Confirmar APROVAR?")) return;
        sendDecision("APROVADO");
      };

      document.getElementById('btnKo').onclick = () => {
        log("Clique: REPROVAR");
        if (!confirm("Confirmar REPROVAR?")) return;
        sendDecision("REPROVADO");
      };

      // Auto-submit apenas se tiver prefill e NÃO existir decisão
      if (!STATUS_SUP && (PREFILL === 'APROVADO' || PREFILL === 'REPROVADO')) {
        log("Auto-submit detectado. Enviando em 400ms…");
        setTimeout(() => sendDecision(PREFILL), 400);
      }
    };

    /* ------------------------------
       ENVIO AO APPS SCRIPT
    ------------------------------ */
    let isSending = false;

    function sendDecision(decision){
      if (isSending) {
        log("Tentativa dupla bloqueada.");
        return;
      }
      isSending = true;

      log("Enviando decisão...", { ID, decision, SUP_NAME });

      hideActions();
      showLoading();

      const payload = {
        idRolo: ID,
        decision,
        supervisorName: SUP_NAME
      };

      google.script.run
        .withSuccessHandler(res => {
          hideLoading();
          log("Resposta Apps Script:", res);

          if (!res) {
            showStatus("Erro: resposta inválida do servidor.");
            showActions();
            isSending = false;
            return;
          }

          if (res.status === "AVISO") {
            showStatus(`⚠️ ${res.message}`);
          }
          else if (res.status === "SUCESSO") {
            showStatus(`✅ Decisão aplicada: <b>${res.decisao_final}</b>`);
          }
          else {
            showStatus(`Erro: ${res.message || JSON.stringify(res)}`);
            showActions();
          }
        })
        .withFailureHandler(err => {
          hideLoading();
          log("Falha Apps Script:", err);
          alert("Erro ao enviar: " + (err?.message || JSON.stringify(err)));
          showActions();
          isSending = false;
        })
        .processSupervisorDecision(payload);
    }
  </script>
</body>
</html>
